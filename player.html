<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stream</title>
  <style>
    body { margin: 0; padding: 0; background: #000; height: 100vh; overflow: hidden; }
    video { width: 100%; height: 100%; display: block; object-fit: contain; }
    #loading {
      position: fixed; inset: 0; display: flex;
      align-items: center; justify-content: center;
      color: #888; font-family: sans-serif; font-size: 18px;
      background: #000; z-index: 10;
    }
    #loading.hide { display: none; }
  </style>
</head>
<body>
<div id="loading">loading stream...</div>
<video id="player" controls autoplay></video>

<script>
(function () {
  function params() {
    var p = {};
    var s = location.search.slice(1).split('&');
    for (var i = 0; i < s.length; i++) {
      var kv = s[i].split('=');
      if (kv[0]) p[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('=') || '');
    }
    return p;
  }

  var p = params();
  var url = p.url;
  var referer = p.referer || '';
  var video = document.getElementById('player');
  var loading = document.getElementById('loading');

  if (!url) { loading.textContent = 'No URL'; return; }

  if (url.match(/\.(mp4|webm|ogg)$/i)) {
    loading.classList.add('hide');
    video.src = url;
    video.play().catch(function () {});
    return;
  }

  if (url.match(/\.m3u8/)) {
    function loadHlsJs(cb) {
      if (typeof Hls !== 'undefined') { cb(); return; }
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest';
      s.onload = cb;
      document.head.appendChild(s);
    }

    loadHlsJs(function () {
      if (Hls.isSupported()) {
        var config = {};
        if (referer) {
          config.fetchSetup = function (context, initParams) {
            if (initParams) {
              initParams.referrer = referer;
              initParams.referrerPolicy = 'unsafe-url';
            }
            return new Request(context.url, initParams);
          };
        }
        var hls = new Hls(config);
        hls.loadSource(url);
        hls.attachMedia(video);

        var errorShown = false;
        var showError = function (msg) {
          if (errorShown) return;
          errorShown = true;
          loading.textContent = msg || 'Error loading stream';
        };

        var timeout = setTimeout(function () {
          showError('Stream timed out (CDN blocked or unreachable)');
        }, 15000);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          clearTimeout(timeout);
          loading.classList.add('hide');
          video.play().catch(function () {});
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            clearTimeout(timeout);
            showError('Stream failed to load (403 — CDN blocked)');
          }
        });
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        loading.classList.add('hide');
        video.src = url;
        video.play().catch(function () {});
      }
    });
  }
})();
</script>
</body>
</html>
